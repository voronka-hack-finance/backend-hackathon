x-app-env: &app-env
  DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/family_budget
  CORS_ORIGINS: "*"
  GATEWAY_PUBLIC_URL: http://localhost:8081
  JWT_SECRET: dev-secret-change-me
  JWT_ISSUER: family-budget-backend
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_SECURE: "false"
  UPLOADS_BUCKET: uploaded-files
  UPLOADS_BUCKET_POLICY: private
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: "5672"
  REDIS_HOST: redis
  REDIS_PORT: "6379"

x-backend-build: &backend-build
  context: .
  dockerfile: Dockerfile.service
  target: runtime
  args:
    PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
    # Leave empty on servers without reliable access to pypi.org (avoids pip ReadTimeoutError).
    PIP_FALLBACK_INDEX_URL: ${PIP_FALLBACK_INDEX_URL:-}
    PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}

x-backend-image: &backend-image
  build: *backend-build
  image: family-budget-backend:latest

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: family_budget
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d family_budget"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migration-service:
    <<: *backend-image
    command: python -m services.migration_service.app.main
    environment:
      <<: *app-env
      BOOTSTRAP_EXCEL_ENABLED: ${BOOTSTRAP_EXCEL_ENABLED:-true}
      BOOTSTRAP_EXCEL_PATH: ${BOOTSTRAP_EXCEL_PATH:-/app/family-bugget.xlsx}
      BOOTSTRAP_RESET_ON_START: ${BOOTSTRAP_RESET_ON_START:-true}
      BOOTSTRAP_USER_EMAIL: ${BOOTSTRAP_USER_EMAIL:-demo@example.com}
      BOOTSTRAP_USER_PASSWORD: ${BOOTSTRAP_USER_PASSWORD:-secret123}
      BOOTSTRAP_USER_DISPLAY_NAME: ${BOOTSTRAP_USER_DISPLAY_NAME:-Иван Иванов}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"

  create-bucket-service:
    <<: *backend-image
    command: python -m services.create_bucket_service.app.main
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully
    restart: "no"

  access-service:
    <<: *backend-image
    command: uvicorn services.access_service.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  finance-service:
    <<: *backend-image
    command: uvicorn services.finance_service.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  file-service:
    <<: *backend-image
    command: uvicorn services.file_service.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully
      create-bucket-service:
        condition: service_completed_successfully
      finance-service:
        condition: service_started

  analytics-service:
    <<: *backend-image
    command: uvicorn services.analytics_service.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  scheduler-service:
    <<: *backend-image
    command: uvicorn services.scheduler_service.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  notification-service:
    <<: *backend-image
    command: uvicorn services.notification_service.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
      FIREBASE_ENABLED: ${FIREBASE_ENABLED:-true}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      FIREBASE_PRIVATE_KEY_ID: ${FIREBASE_PRIVATE_KEY_ID:-}
    env_file:
      - path: .env
        required: false
      - path: infra/.env
        required: false
    volumes:
      - ./infra/secrets:/app/infra/secrets:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  group-service:
    <<: *backend-image
    command: uvicorn services.group_service.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  chat-service:
    <<: *backend-image
    command: uvicorn services.chat_service.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  health-score-service:
    <<: *backend-image
    command: uvicorn services.health_score_service.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  backend-data-worker:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.backend_data_worker.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
      AI_BACKEND_DATA_REQUEST_QUEUE: ai.backend.data.requests
      AI_CONTEXT_BUILDER_RESPONSE_QUEUE: ai.context_builder.backend_data.responses
      BACKEND_DATA_PROVIDER: rpc
      FINANCE_SERVICE_QUEUE: finance-service
      ANALYTICS_SERVICE_QUEUE: analytics-service
      RPC_TIMEOUT_SECONDS: "25"
    depends_on:
      rabbitmq:
        condition: service_healthy
      finance-service:
        condition: service_started
      analytics-service:
        condition: service_started

  gateway:
    <<: *backend-image
    command: uvicorn services.gateway.app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
    ports:
      - "8081:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      access-service:
        condition: service_started
      file-service:
        condition: service_started
      finance-service:
        condition: service_started
      analytics-service:
        condition: service_started
      health-score-service:
        condition: service_started
      notification-service:
        condition: service_started
      group-service:
        condition: service_started
      chat-service:
        condition: service_started
      scheduler-service:
        condition: service_started

volumes:
  postgres-data:
  minio-data:
