x-backend-build: &backend-build
  context: .
  dockerfile: Dockerfile.service
  target: runtime
  args:
    PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
    PIP_FALLBACK_INDEX_URL: ${PIP_FALLBACK_INDEX_URL:-}
    PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}

x-backend-image: &backend-image
  build: *backend-build
  image: family-budget-backend:latest

# Recreate RabbitMQ when infra/rabbitmq/* changes: bump revision below (definitions load only at startup).
x-rabbitmq-ready: &rabbitmq-ready
  condition: service_healthy
  restart: true

services:
  postgres:
    image: postgres:17.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: family_budget
    volumes:
      - backend-postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - backend-minio-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFINITIONS_REVISION: "2"
    ports:
      - "${RABBITMQ_EXTERNAL_BIND:-0.0.0.0}:${RABBITMQ_EXTERNAL_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  migration-service:
    <<: *backend-image
    command: python -m services.migration_service.app.main
    restart: "no"
    environment: &app_env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/family_budget
      JWT_SECRET: dev-secret-change-me
      JWT_ISSUER: family-budget-backend
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      UPLOADS_BUCKET: uploaded-files
      UPLOADS_BUCKET_POLICY: private
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      - postgres

  create-bucket-service:
    <<: *backend-image
    command: python -m services.create_bucket_service.app.main
    restart: "no"
    environment: *app_env
    depends_on:
      - minio
      - migration-service

  access-service:
    <<: *backend-image
    command: uvicorn services.access_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq: *rabbitmq-ready
      migration-service:
        condition: service_completed_successfully

  finance-service:
    <<: *backend-image
    command: uvicorn services.finance_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq: *rabbitmq-ready
      migration-service:
        condition: service_completed_successfully

  file-service:
    <<: *backend-image
    command: uvicorn services.file_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq: *rabbitmq-ready
      migration-service:
        condition: service_completed_successfully
      create-bucket-service:
        condition: service_completed_successfully
      finance-service:
        condition: service_started

  analytics-service:
    <<: *backend-image
    command: uvicorn services.analytics_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq: *rabbitmq-ready
      migration-service:
        condition: service_completed_successfully

  scheduler-service:
    <<: *backend-image
    command: uvicorn services.scheduler_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq: *rabbitmq-ready
      migration-service:
        condition: service_completed_successfully

  notification-service:
    <<: *backend-image
    command: uvicorn services.notification_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq: *rabbitmq-ready
      migration-service:
        condition: service_completed_successfully

  group-service:
    <<: *backend-image
    command: uvicorn services.group_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq: *rabbitmq-ready
      migration-service:
        condition: service_completed_successfully

  chat-service:
    <<: *backend-image
    command: uvicorn services.chat_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment:
      <<: *app_env
      RABBITMQ_WORKFLOW_URL: ${RABBITMQ_WORKFLOW_URL:-amqp://finance_ai:finance_ai@rabbitmq:5672/}
      RABBITMQ_WORKFLOW_QUEUE: ${RABBITMQ_WORKFLOW_QUEUE:-ai.workflow.tasks}
      RABBITMQ_WORKFLOW_RESULT_QUEUE: ${RABBITMQ_WORKFLOW_RESULT_QUEUE:-ai.workflow.results}
      AI_WORKFLOW_PUBLISH_ENABLED: ${AI_WORKFLOW_PUBLISH_ENABLED:-true}
      AI_WORKFLOW_RESULT_CONSUMER_ENABLED: ${AI_WORKFLOW_RESULT_CONSUMER_ENABLED:-true}
      AI_WORKFLOW_DEFAULT_TIMEZONE: ${AI_WORKFLOW_DEFAULT_TIMEZONE:-UTC}
    depends_on:
      rabbitmq: *rabbitmq-ready
      migration-service:
        condition: service_completed_successfully

  backend-data-worker:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.backend_data_worker.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment:
      <<: *app_env
      AI_BACKEND_DATA_REQUEST_QUEUE: ai.backend.data.requests
      AI_CONTEXT_BUILDER_RESPONSE_QUEUE: ai.context_builder.backend_data.responses
      BACKEND_DATA_PROVIDER: rpc
      FINANCE_SERVICE_QUEUE: finance-service
      ANALYTICS_SERVICE_QUEUE: analytics-service
      RPC_TIMEOUT_SECONDS: "25"
    depends_on:
      rabbitmq: *rabbitmq-ready
      finance-service:
        condition: service_started
      analytics-service:
        condition: service_started

  gateway:
    <<: *backend-image
    command: uvicorn services.gateway.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    ports:
      - "127.0.0.1:8081:8000"
    depends_on:
      rabbitmq: *rabbitmq-ready
      access-service:
        condition: service_started
      file-service:
        condition: service_started
      finance-service:
        condition: service_started
      analytics-service:
        condition: service_started
      notification-service:
        condition: service_started
      group-service:
        condition: service_started
      chat-service:
        condition: service_started
      scheduler-service:
        condition: service_started

volumes:
  backend-postgres-data:
  backend-minio-data:
