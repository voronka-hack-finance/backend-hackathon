name: Deploy backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Get repository code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare backend directory
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /opt/zanachka/backend"

      - name: Upload backend to server
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".venv" \
            -e "ssh -p ${{ secrets.VPS_PORT }}" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/zanachka/backend/

      - name: Create production compose and restart backend
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e

            cd /opt/zanachka/backend

            cat > docker-compose.prod.yml <<'COMPOSEEOF'
services:
  postgres:
    image: postgres:17.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: family_budget
    volumes:
      - backend-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d family_budget"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - backend-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migration-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: python -m services.migration_service.app.main
    restart: "no"
    environment: &app_env
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/family_budget
      JWT_SECRET: dev-secret-change-me
      JWT_ISSUER: family-budget-backend
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      UPLOADS_BUCKET: uploaded-files
      UPLOADS_BUCKET_POLICY: private
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy

  create-bucket-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: python -m services.create_bucket_service.app.main
    restart: "no"
    environment: *app_env
    depends_on:
      minio:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  access-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.access_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  finance-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.finance_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  file-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.file_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully
      create-bucket-service:
        condition: service_completed_successfully
      finance-service:
        condition: service_started

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.analytics_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  scheduler-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.scheduler_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.notification_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  group-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.group_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  chat-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.chat_service.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration-service:
        condition: service_completed_successfully

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
    command: uvicorn services.gateway.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: *app_env
    ports:
      - "127.0.0.1:8081:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      access-service:
        condition: service_started
      file-service:
        condition: service_started
      finance-service:
        condition: service_started
      analytics-service:
        condition: service_started
      notification-service:
        condition: service_started
      group-service:
        condition: service_started
      chat-service:
        condition: service_started
      scheduler-service:
        condition: service_started

volumes:
  backend-postgres-data:
  backend-minio-data:
COMPOSEEOF

            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
          EOF
